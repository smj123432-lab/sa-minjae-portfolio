<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">수동 입력 수입이 지출로 잘못 집계되는 버그가 월간 요약, 날짜 패널, 달력 배지 세 화면에 동시에 나타났다. 원인은 집계 로직이 세 곳에 분산돼 있던 것으로, 각 지점에 동일한 분기 처리를 동시에 적용해 전 화면의 수입, 지출, 순수익 수치를 정상화했다.</desc>
