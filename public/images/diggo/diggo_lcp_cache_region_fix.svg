<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">LCP 캐싱 및 리전 전환 아키텍처 다이어그램</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">기존에는 Vercel 함수가 미국 동부 리전에서 실행되며 매 요청마다 캐시 없이 Supabase를 3회 조회해 서울 리전과의 왕복 지연이 누적됐다. use cache 적용과 Vercel 리전을 서울(icn1)로 전환해 재요청 시 캐시를 재사용하도록 바꾼 결과 LCP가 9.0초에서 4.4초로, TBT가 70ms에서 0ms로, Performance 점수가 73점에서 83점으로 개선됐다.</desc>
<defs>
